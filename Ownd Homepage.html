<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ownd — Rent to Own Property Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Green scale */
    --green-50: #CCFF66;
    --green-100: #79F233;
    --green-200: #5BD239;
    --green-300: #3DB140;
    --green-400: #1E9146;
    --green-500: #00704C;
    --green-600: #026147;
    --green-700: #045242;
    --green-800: #06443D;
    --green-900: #083538;
    --green-1000: #0A2633;
    /* Gray scale */
    --gray-50: #FFFFFF;
    --gray-100: #FCFCFC;
    --gray-200: #F4F4F5;
    --gray-300: #E4E5E6;
    --gray-400: #D1D3D5;
    --gray-500: #BFC1C4;
    --gray-600: #A0A3A7;
    --gray-700: #80848A;
    --gray-800: #60646B;
    --gray-900: #40444B;
    --gray-1000: #1A1D24;
    /* Semantic */
    --ink: #0A2633;
    --ink-soft: #40444B;
    --muted: #80848A;
    --bg: #F4F4F5;
    --surface: #FFFFFF;
    --line: #E4E5E6;
    --primary: #00704C;
    --primary-soft: #E6F4EE;
    --accent: #79F233;
    --line-green: #06C755;
    /* Radii */
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 20px;
    --r-xl: 28px;
    --r-2xl: 36px;
    --r-pill: 999px;
    /* Shadows */
    --sh-sm: 0 1px 2px rgba(10,38,51,0.05);
    --sh-md: 0 6px 16px rgba(10,38,51,0.06), 0 2px 4px rgba(10,38,51,0.04);
    --sh-lg: 0 18px 40px rgba(10,38,51,0.08), 0 4px 12px rgba(10,38,51,0.04);
    --sh-card: 0 1px 0 rgba(10,38,51,0.04), 0 12px 28px rgba(10,38,51,0.06);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Prompt', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 16px;
    line-height: 1.5;
  }
  .latin { font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--green-1000); }

  /* Placeholder striped surface for images */
  .ph {
    position: relative;
    background-color: var(--gray-300);
    background-image:
      repeating-linear-gradient(135deg,
        rgba(10,38,51,0.05) 0 2px,
        transparent 2px 14px);
    overflow: hidden;
    color: var(--gray-800);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .ph::after {
    content: ""; position: absolute; inset: 12px;
    border: 1px dashed rgba(10,38,51,0.18);
    border-radius: inherit;
    pointer-events: none;
  }
  .ph-label {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.85);
    padding: 6px 10px;
    border-radius: 6px;
    color: var(--gray-900);
    font-weight: 600;
  }

  /* Page shell */
  .page { max-width: 1440px; margin: 0 auto; padding: 24px 32px 80px; }

  /* === TOP BAR === */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .brand-link {
    display: inline-flex; align-items: center;
    margin-left: -10px;
    padding: 6px 14px 6px 10px;
    border-radius: var(--r-pill);
    transition: background 200ms ease, transform 200ms ease;
  }
  .brand-link:hover { background: rgba(0,112,76,0.06); }
  .brand-img {
    height: 112px; width: auto; display: block;
    object-fit: contain;
    filter: drop-shadow(0 6px 14px rgba(10,38,51,0.10));
    filter: drop-shadow(0 2px 8px rgba(10,38,51,0.06));
    transition: transform 200ms ease;
  }
  .brand-link:hover .brand-img { transform: scale(1.03); }
  .nav-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px; border-radius: var(--r-pill);
    font-weight: 600; font-size: 14px;
    border: 1px solid transparent;
    transition: transform 150ms ease, box-shadow 200ms ease, background 200ms ease;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-dark {
    background: var(--gray-800); color: #fff;
  }
  .btn-dark:hover { background: var(--gray-900); }
  .btn-line {
    background: var(--line-green); color: #fff;
  }
  .btn-line:hover { background: #05a948; }
  .btn-login {
    background: #fff; color: var(--ink);
    border-color: var(--line);
    box-shadow: var(--sh-sm);
  }
  .btn-login:hover { border-color: var(--ink); }

  /* === HERO GRID === */
  .hero-grid {
    display: grid;
    grid-template-columns: 1.15fr 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
    margin-bottom: 28px;
  }
  .tile {
    background: var(--surface);
    border-radius: var(--r-2xl);
    padding: 32px;
    box-shadow: var(--sh-card);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }

  /* Big primary card — left, spans 2 rows */
  .tile-primary {
    grid-row: 1 / span 2;
    background:
      radial-gradient(110% 80% at 0% 0%, rgba(121,242,51,0.18) 0%, transparent 55%),
      linear-gradient(180deg, #ffffff 0%, #ffffff 60%, #F9FFF4 100%);
    padding: 48px 44px 36px;
    display: flex; flex-direction: column;
    gap: 22px;
  }
  .hero-eyebrow-light {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 800;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--primary);
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: -4px;
  }
  .hero-eyebrow-light::before {
    content: ""; width: 24px; height: 2px;
    background: var(--primary); border-radius: 2px;
  }
  .h1-thai-row {
    display: flex; align-items: baseline;
    gap: 0;
    margin: 0;
  }
  .logo {
    display: flex; align-items: center; gap: 2px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 34px;
    letter-spacing: -0.04em;
    color: var(--green-1000);
    line-height: 1;
  }
  .logo .o-mark {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: conic-gradient(from 220deg, var(--green-100) 0deg, var(--green-300) 90deg, var(--green-500) 180deg, var(--green-1000) 270deg, var(--green-100) 360deg);
    -webkit-mask: radial-gradient(circle at center, transparent 9px, #000 10px);
            mask: radial-gradient(circle at center, transparent 9px, #000 10px);
    margin-right: 4px;
  }
  .logo .d-mark {
    display: inline-block;
    width: 30px; height: 38px;
    background: linear-gradient(160deg, var(--green-100), var(--green-500) 70%, var(--green-1000));
    border-top-right-radius: 19px;
    border-bottom-right-radius: 19px;
    margin-left: -4px;
  }

  .h1-thai {
    font-weight: 800;
    font-size: 112px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin: 0;
    display: inline-block;
  }
  .h1-thai.hl {
    color: var(--primary);
    background: none;
    -webkit-text-fill-color: var(--primary);
    color: transparent;
  }
  .sub-thai {
    font-size: 24px; font-weight: 500;
    color: var(--ink-soft);
    margin: 14px 0 0;
    line-height: 1.35;
  }
  .sub-thai strong { font-weight: 700; color: var(--ink); }

  /* Feature pills row */
  .feat-pills {
    display: flex; gap: 28px;
    align-items: flex-start;
    margin-top: 4px;
  }
  .feat-pill {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    flex: 1; min-width: 0;
    text-align: center;
  }
  .feat-pill .icn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, rgba(121,242,51,0.6), rgba(0,112,76,0.12) 60%, transparent 75%),
      #E6F4EE;
    color: var(--primary);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 0 1px rgba(0,112,76,0.15);
  }
  .feat-pill .t {
    font-size: 15px; font-weight: 700;
    color: var(--ink); line-height: 1.1;
    margin: 0;
  }
  .feat-pill .d {
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    margin: 0;
  }

  .search-block { margin-top: auto; }
  .search-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700; font-size: 18px;
    color: var(--ink); margin: 0 0 10px;
    letter-spacing: -0.01em;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .search-label .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green-300);
    box-shadow: 0 0 0 4px rgba(61,177,64,0.15);
  }
  .search-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-md);
    padding: 14px;
  }
  .search-card .search-label { margin: 2px 4px 12px; }
  .search-tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--line);
    margin: -4px -4px 12px;
    padding: 0 4px;
  }
  .tab {
    background: transparent; border: 0;
    padding: 10px 14px 12px;
    font-size: 15px; font-weight: 600;
    color: var(--muted);
    position: relative;
    transition: color 150ms ease;
  }
  .tab.active { color: var(--primary); }
  .tab.active::after {
    content: ""; position: absolute;
    left: 10px; right: 10px; bottom: -1px;
    height: 3px; border-radius: 3px 3px 0 0;
    background: var(--primary);
  }
  .search-row {
    display: flex; gap: 8px; align-items: stretch;
  }
  .search-input {
    flex: 1;
    display: flex; align-items: center; gap: 10px;
    background: var(--gray-200);
    border: 1px solid transparent;
    border-radius: var(--r-md);
    padding: 12px 14px;
    transition: border 150ms ease, background 150ms ease;
  }
  .search-input:focus-within {
    background: #fff;
    border-color: var(--green-500);
  }
  .search-input svg { color: var(--muted); flex-shrink: 0; }
  .search-input input {
    flex: 1; border: 0; background: transparent; outline: none;
    font-family: inherit; font-size: 14px;
    color: var(--ink);
  }
  .search-input input::placeholder { color: var(--gray-700); }
  .btn-search {
    background: var(--primary); color: #fff;
    border: none; border-radius: var(--r-md);
    padding: 0 22px;
    font-weight: 700; font-size: 14px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background 150ms ease;
  }
  .btn-search:hover { background: var(--green-600); }
  .chips { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 8px 14px;
    font-size: 13px; font-weight: 500;
    color: var(--ink-soft);
    transition: border 120ms ease, color 120ms ease;
  }
  .chip:hover { border-color: var(--green-500); color: var(--primary); }
  .chip.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray-500); }

  /* === FILTER MODAL === */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,38,51,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    overflow: hidden;
    animation: backdropIn 200ms ease;
  }
  @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #fff;
    border-radius: 24px;
    width: 100%;
    max-width: 560px;
    max-height: 88vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(10,38,51,0.3);
    animation: modalIn 240ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes modalIn {
    from { transform: translateY(20px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .modal-head {
    background: var(--green-1000);
    color: #fff;
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-head h3 {
    margin: 0; font-size: 20px; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .modal-close {
    background: rgba(255,255,255,0.08);
    border: 0; color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 150ms ease;
  }
  .modal-close:hover { background: rgba(255,255,255,0.18); }
  .modal-tabs {
    display: flex; gap: 4px;
    padding: 4px 24px 0;
    border-bottom: 1px solid var(--line);
    overflow: visible;
    flex-shrink: 0;
  }
  .modal-tab {
    background: transparent; border: 0;
    padding: 14px 6px 16px;
    margin-right: 24px;
    font-size: 15px; font-weight: 600;
    color: var(--muted);
    line-height: 1.2;
    position: relative; white-space: nowrap;
    transition: color 150ms ease;
  }
  .modal-tab.active { color: var(--ink); font-weight: 700; }
  .modal-tab.active::after {
    content: ""; position: absolute;
    left: 0; right: 24px; bottom: -1px;
    height: 3px; border-radius: 3px 3px 0 0;
    background: var(--primary);
  }
  .modal-body {
    padding: 24px;
    flex: 1; min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--line);
    display: flex; gap: 12px;
    background: var(--gray-100);
    flex-shrink: 0;
  }
  .btn-cancel, .btn-apply {
    flex: 1;
    padding: 14px 20px;
    border-radius: var(--r-pill);
    font-weight: 700; font-size: 15px;
    border: 0;
    transition: background 150ms ease, transform 150ms ease;
  }
  .btn-cancel {
    background: #fff; color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-cancel:hover { background: var(--gray-200); }
  .btn-apply {
    background: var(--primary); color: #fff;
    box-shadow: 0 4px 12px rgba(0,112,76,0.25);
  }
  .btn-apply:hover { background: var(--green-600); transform: translateY(-1px); }

  /* Filter content */
  .sub-chips { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .sub-chip {
    padding: 10px 22px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: #fff;
    font-size: 15px; font-weight: 600;
    color: var(--ink-soft);
    transition: all 150ms ease;
  }
  .sub-chip.active {
    background: var(--green-1000); color: #fff;
    border-color: var(--green-1000);
  }
  .sub-chip:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

  .opt-list { display: flex; flex-direction: column; }
  .opt-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    font-size: 16px; color: var(--ink);
    transition: color 150ms ease;
  }
  .opt-row:hover { color: var(--primary); }
  .opt-row:last-child { border-bottom: 0; }
  .radio {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--gray-500);
    flex-shrink: 0;
    position: relative;
    transition: border-color 150ms ease;
  }
  .opt-row.checked .radio { border-color: var(--primary); }
  .opt-row.checked .radio::after {
    content: ""; position: absolute;
    inset: 3px; border-radius: 50%;
    background: var(--primary);
  }

  .price-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 20px;
  }
  .price-field { min-width: 0; }
  .price-input { min-width: 0; }
  .price-input input { min-width: 0; width: 100%; }
  .price-field label {
    display: block; font-size: 14px; color: var(--muted);
    margin-bottom: 8px; font-weight: 500;
  }
  .price-input {
    display: flex; align-items: center;
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 12px 16px;
    gap: 10px;
    transition: border-color 150ms ease;
  }
  .price-input:focus-within, .price-input.focused { border-color: var(--primary); background: var(--primary-soft); }
  .price-input .baht {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--gray-200); color: var(--ink-soft);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .price-input input {
    flex: 1; border: 0; outline: none;
    font-family: inherit; font-size: 15px;
    color: var(--ink);
    background: transparent;
  }
  .price-input input::placeholder { color: var(--gray-600); }
  .price-input .caret { color: var(--muted); }

  .preset-list {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 8px;
    max-height: 260px;
    overflow-y: auto;
  }
  .preset-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px; color: var(--ink);
    transition: background 120ms ease;
  }
  .preset-row:hover { background: var(--gray-200); }

  .room-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 10px;
  }
  .room-cell {
    padding: 16px 12px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    font-size: 16px; font-weight: 600;
    color: var(--ink-soft);
    transition: all 150ms ease;
  }
  .room-cell.active {
    background: var(--primary-soft);
    border-color: var(--primary);
    color: var(--primary);
  }
  .room-cell:hover:not(.active) { border-color: var(--primary); }

  .loc-list { display: flex; flex-direction: column; gap: 8px; }
  .loc-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 14px;
    cursor: pointer;
    font-size: 15px; color: var(--ink);
    transition: all 150ms ease;
  }
  .loc-row:hover { border-color: var(--primary); background: var(--primary-soft); }
  .loc-row.checked { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); font-weight: 600; }
  .loc-row .ic { color: var(--muted); }
  .loc-row.checked .ic { color: var(--primary); }

  /* Two CTA tiles top right */
  .tile-cta {
    display: flex; flex-direction: column;
    justify-content: space-between;
    gap: 14px;
    padding: 24px 26px;
    min-height: 240px;
    position: relative;
    overflow: hidden;
    isolation: isolate;
    color: #fff;
    box-shadow:
      0 1px 0 rgba(10,38,51,0.04),
      0 8px 18px rgba(10,38,51,0.08),
      0 24px 48px rgba(10,38,51,0.14);
    transition: transform 220ms ease, box-shadow 220ms ease;
  }
  .tile-cta:hover {
    transform: translateY(-2px);
    box-shadow:
      0 1px 0 rgba(10,38,51,0.05),
      0 12px 24px rgba(10,38,51,0.10),
      0 32px 64px rgba(10,38,51,0.18);
  }
  .tile-cta-1 {
    box-shadow:
      0 1px 0 rgba(6,68,61,0.10),
      0 10px 22px rgba(6,68,61,0.20),
      0 28px 56px rgba(6,68,61,0.28);
  }
  .tile-cta-1:hover {
    box-shadow:
      0 1px 0 rgba(6,68,61,0.12),
      0 14px 28px rgba(6,68,61,0.24),
      0 36px 72px rgba(6,68,61,0.34);
  }
  .tile-cta .tile-bg {
    position: absolute; inset: 0; z-index: 0;
    background-size: cover;
    background-position: center right;
    background-repeat: no-repeat;
  }
  .tile-cta .tile-overlay {
    position: absolute; inset: 0; z-index: 0;
  }
  .tile-cta > * { position: relative; z-index: 1; }

  .tile-cta-1 {
    background: #0A2633;
    border-color: transparent;
  }
  .tile-cta-1 .tile-bg { background-image: url('assets/hero-02.png'); }
  .tile-cta-1 .tile-overlay {
    background:
      linear-gradient(95deg, rgba(10,38,51,0.92) 0%, rgba(6,68,61,0.72) 45%, rgba(6,68,61,0.18) 100%),
      linear-gradient(180deg, transparent 60%, rgba(10,38,51,0.55) 100%);
  }

  .tile-cta-2 {
    background: #EAF7DA;
    border-color: transparent;

  const [tab, setTab] = useState(initialTab);

  React.useEffect(() => { if (open) setTab(initialTab); }, [open, initialTab]);
  React.useEffect(() => {
    if (open) {
      const prev = document.body.style.overflow;
      document.body.style.overflow = 'hidden';
      return () => { document.body.style.overflow = prev; };
    }
  }, [open]);

  if (!open) return null;

  const TABS = [
